services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: epiphaneia-frontend
    ports:
      - "${EPI_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epiphaneia-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: epiphaneia:${EPI_VERSION:-0.9.0}
    container_name: epiphaneia-app
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/epiphaneia
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-epiphaneia}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - EPIPHANEIA_ENCRYPTION_KEY=${EPIPHANEIA_ENCRYPTION_KEY}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epiphaneia-network

  postgres:
    image: postgres:16-alpine
    container_name: epiphaneia-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=epiphaneia
      - POSTGRES_USER=${DB_USER:-epiphaneia}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-epiphaneia} -d epiphaneia"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - epiphaneia-network

volumes:
  pg_data:
    driver: local
    name: epiphaneia-pg-data

networks:
  epiphaneia-network:
    driver: bridge
    name: epiphaneia-network
