services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: epiphaneia-frontend
    ports:
      - "${EPI_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epiphaneia-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: epiphaneia-app
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/epiphaneia
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-epiphaneia}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JPA_DDL_AUTO=update
      - EPIPHANEIA_ENCRYPTION_KEY=${EPIPHANEIA_ENCRYPTION_KEY}
      - SPRING_AI_OPENAI_API_KEY=${OPENAI_API_KEY:-none}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epiphaneia-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: epiphaneia-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=epiphaneia
      - POSTGRES_USER=${DB_USER:-epiphaneia}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-epiphaneia} -d epiphaneia"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - epiphaneia-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data:
    driver: local
    name: epiphaneia-pg-data

networks:
  epiphaneia-network:
    driver: bridge
    name: epiphaneia-network
