server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: ${COOKIE_SECURE:false}
        same-site: ${COOKIE_SAME_SITE:lax}

spring:
  application:
    name: epiphaneia
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/epiphaneia}
    username: ${SPRING_DATASOURCE_USERNAME:epiphaneia}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: ${JPA_SHOW_SQL:false}

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

epiphaneia:
  encryption-key: ${EPIPHANEIA_ENCRYPTION_KEY}

logging:
  level:
    io.epiphaneia: ${LOG_LEVEL:INFO}
